<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>隆隆排骨便當 線上訂購單</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; padding: 1rem; }
    .wrap { max-width: 640px; margin: 0 auto; padding-bottom: 2rem; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 1.5rem; text-align: center; }

    .header { display: flex; align-items: center; gap: 12px; background: #fff; border: 1px solid #e5e5e5; border-radius: 14px; padding: 1rem 1.25rem; margin-bottom: .25rem; }
    .store-icon { width: 46px; height: 46px; border-radius: 10px; background: #eff6ff; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .store-icon i { font-size: 24px; color: #3b82f6; }
    .store-name { font-size: 16px; font-weight: 600; }
    .store-addr { font-size: 12px; color: #666; margin-top: 2px; }

    .section-title { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .07em; margin: 1.25rem 0 .5rem .25rem; }

    .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 14px; padding: 1rem 1.25rem; }

    .map-btn { display: flex; align-items: center; gap: 14px; background: #fff; border: 1px solid #e5e5e5; border-radius: 14px; padding: 14px 16px; text-decoration: none; transition: background .15s; }
    .map-btn:hover { background: #f9f9f9; }
    .map-icon-wrap { width: 48px; height: 48px; border-radius: 10px; background: #fff; border: 1px solid #e5e5e5; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .map-icon-wrap svg { width: 28px; height: 28px; }
    .map-text { flex: 1; }
    .map-text-title { font-size: 14px; font-weight: 600; color: #1a1a1a; }
    .map-text-sub { font-size: 12px; color: #666; margin-top: 2px; }
    .map-arrow { color: #bbb; font-size: 18px; }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
    .field:last-child { margin-bottom: 0; }
    .field label { font-size: 13px; color: #555; }
    .field input, .field select, .field textarea {
      font-size: 14px; padding: 9px 12px; border: 1px solid #ddd;
      border-radius: 8px; outline: none; width: 100%;
      font-family: inherit; background: #fafafa; color: #1a1a1a;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: #888; background: #fff; }
    .field textarea { resize: vertical; min-height: 68px; }

    .pickup-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
    .pickup-tab { flex: 1; padding: 9px 6px; border: 1px solid #ddd; border-radius: 8px; background: none; cursor: pointer; font-size: 13px; color: #666; font-family: inherit; transition: all .15s; }
    .pickup-tab.active { border-color: #1a1a1a; background: #f0f0f0; color: #1a1a1a; font-weight: 600; }

    .menu-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
    .menu-item:last-child { border-bottom: none; }
    .menu-thumb { width: 42px; height: 42px; border-radius: 10px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .menu-thumb i { font-size: 20px; color: #bbb; }
    .menu-info { flex: 1; }
    .menu-label { font-size: 14px; font-weight: 500; }
    .menu-price-tag { font-size: 12px; color: #888; margin-top: 1px; }
    .qty-ctrl { display: flex; align-items: center; gap: 7px; }
    .qty-ctrl button { width: 30px; height: 30px; border-radius: 50%; border: 1px solid #ddd; background: #fff; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; color: #1a1a1a; line-height: 1; font-family: inherit; }
    .qty-ctrl button:hover { background: #f5f5f5; }
    .qty-val { font-size: 15px; font-weight: 600; min-width: 22px; text-align: center; }
    .item-total { font-size: 14px; font-weight: 500; min-width: 42px; text-align: right; }

    .sum-row { display: flex; justify-content: space-between; font-size: 14px; color: #666; padding: 5px 0; }
    .sum-row.bold { font-size: 16px; font-weight: 600; color: #1a1a1a; padding-top: 10px; border-top: 1px solid #eee; margin-top: 4px; }

    .hint-box { background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px; padding: .75rem 1rem; font-size: 13px; color: #92400e; margin-top: .75rem; line-height: 1.6; }

    .submit-btn { width: 100%; padding: 14px; background: #1a1a1a; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 1.25rem; font-family: inherit; transition: opacity .15s; }
    .submit-btn:hover { opacity: .85; }
    .submit-btn:disabled { opacity: .4; cursor: default; }

    .success-card { display: none; border: 1px solid #bbf7d0; border-radius: 14px; padding: 1.5rem 1.25rem; text-align: center; background: #f0fdf4; margin-top: 1rem; }
    .success-icon { font-size: 36px; color: #16a34a; display: block; margin-bottom: 8px; }
    .success-title { font-size: 16px; font-weight: 600; color: #15803d; }
    .success-sub { font-size: 13px; color: #555; margin-top: 6px; line-height: 1.6; }
    .copy-btn { display: inline-flex; align-items: center; gap: 6px; margin-top: 14px; padding: 9px 18px; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; font-size: 13px; font-family: inherit; }
    .copy-btn:hover { background: #f5f5f5; }
    .order-box { background: #f9f9f9; border-radius: 10px; padding: .75rem 1rem; margin-top: 12px; text-align: left; font-size: 12px; line-height: 1.9; color: #555; white-space: pre-wrap; border: 1px solid #eee; }

    @media (max-width: 480px) {
      .row2 { grid-template-columns: 1fr; }
      body { padding: .75rem; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="store-icon"><i class="ti ti-building-store"></i></div>
    <div>
      <div class="store-name">隆隆排骨便當</div>
      <div class="store-addr"><i class="ti ti-map-pin" style="font-size:12px;vertical-align:-1px"></i> 桃園市龍潭區中正里龍華路460號</div>
    </div>
  </div>

  <p class="section-title">店家位置</p>
  <a class="map-btn" href="https://www.google.com/maps/search/?api=1&query=桃園市龍潭區中正里龍華路460號" target="_blank" rel="noopener">
    <div class="map-icon-wrap">
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path d="M24 4C16.268 4 10 10.268 10 18c0 10.5 14 26 14 26s14-15.5 14-26c0-7.732-6.268-14-14-14z" fill="#EA4335"/>
        <circle cx="24" cy="18" r="5" fill="#fff"/>
      </svg>
    </div>
    <div class="map-text">
      <div class="map-text-title">在 Google 地圖查看</div>
      <div class="map-text-sub">桃園市龍潭區中正里龍華路460號 · 點擊可導航</div>
    </div>
    <i class="ti ti-chevron-right map-arrow"></i>
  </a>

  <p class="section-title">店家收件信箱</p>
  <div class="card">
    <div class="field" style="margin-bottom:0">
      <label for="store-email">訂單將寄送至此信箱 <span style="font-size:11px;color:#aaa">（店家設定）</span></label>
      <input type="email" id="store-email" placeholder="store@example.com">
    </div>
  </div>

  <p class="section-title">訂購人資料</p>
  <div class="card">
    <div class="row2">
      <div class="field">
        <label for="name">姓名 *</label>
        <input type="text" id="name" placeholder="請輸入姓名">
      </div>
      <div class="field">
        <label for="phone">電話 *</label>
        <input type="tel" id="phone" placeholder="09xx-xxx-xxx">
      </div>
    </div>
    <div class="field">
      <label for="email">訂購人信箱 <span style="font-size:11px;color:#aaa">（選填，系統會 CC 一份給您）</span></label>
      <input type="email" id="email" placeholder="your@email.com">
    </div>
  </div>

  <p class="section-title">取餐方式</p>
  <div class="card">
    <div class="pickup-tabs">
      <button class="pickup-tab active" onclick="setPickup('self',this)"><i class="ti ti-walk"></i> 自取</button>
      <button class="pickup-tab" onclick="setPickup('delivery',this)"><i class="ti ti-motorbike"></i> 外送</button>
      <button class="pickup-tab" onclick="setPickup('carry',this)"><i class="ti ti-shopping-bag"></i> 外帶</button>
    </div>
    <div id="section-self">
      <div class="row2">
        <div class="field"><label>取餐日期</label><input type="date" id="pdate"></div>
        <div class="field"><label>取餐時間</label><input type="time" id="ptime" value="12:00"></div>
      </div>
    </div>
    <div id="section-delivery" style="display:none">
      <div class="field"><label>外送地址 *</label><input type="text" id="addr" placeholder="請輸入完整地址"></div>
      <div class="row2">
        <div class="field"><label>日期</label><input type="date" id="ddate"></div>
        <div class="field"><label>時間</label><input type="time" id="dtime" value="12:00"></div>
      </div>
    </div>
    <div id="section-carry" style="display:none">
      <div class="row2">
        <div class="field"><label>外帶日期</label><input type="date" id="cdate"></div>
        <div class="field"><label>外帶時間</label><input type="time" id="ctime" value="12:00"></div>
      </div>
    </div>
    <div style="margin-top:10px">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:#555">
        <input type="checkbox" id="utensils"> 索取餐具等用品
      </label>
    </div>
  </div>

  <p class="section-title">選擇餐點</p>
  <div class="card">
    <div id="menu-list">
      <div class="menu-item" data-price="148" data-name="古早味滷排飯">
        <div class="menu-thumb"><i class="ti ti-bowl-chopsticks"></i></div>
        <div class="menu-info"><div class="menu-label">古早味滷排飯</div><div class="menu-price-tag">$148</div></div>
        <div class="qty-ctrl"><button onclick="chg(this,-1)">−</button><span class="qty-val">0</span><button onclick="chg(this,1)">+</button></div>
        <div class="item-total">—</div>
      </div>
      <div class="menu-item" data-price="130" data-name="排骨飯">
        <div class="menu-thumb"><i class="ti ti-bowl-chopsticks"></i></div>
        <div class="menu-info"><div class="menu-label">排骨飯</div><div class="menu-price-tag">$130</div></div>
        <div class="qty-ctrl"><button onclick="chg(this,-1)">−</button><span class="qty-val">0</span><button onclick="chg(this,1)">+</button></div>
        <div class="item-total">—</div>
      </div>
      <div class="menu-item" data-price="110" data-name="魚排飯">
        <div class="menu-thumb"><i class="ti ti-fish"></i></div>
        <div class="menu-info"><div class="menu-label">魚排飯</div><div class="menu-price-tag">$110</div></div>
        <div class="qty-ctrl"><button onclick="chg(this,-1)">−</button><span class="qty-val">0</span><button onclick="chg(this,1)">+</button></div>
        <div class="item-total">—</div>
      </div>
      <div class="menu-item" data-price="140" data-name="燒臘飯">
        <div class="menu-thumb"><i class="ti ti-meat"></i></div>
        <div class="menu-info"><div class="menu-label">燒臘飯</div><div class="menu-price-tag">$140</div></div>
        <div class="qty-ctrl"><button onclick="chg(this,-1)">−</button><span class="qty-val">0</span><button onclick="chg(this,1)">+</button></div>
        <div class="item-total">—</div>
      </div>
    </div>
  </div>

  <p class="section-title">訂單備註</p>
  <div class="card">
    <div class="field" style="margin-bottom:0">
      <label for="note">特殊需求、過敏原說明等</label>
      <textarea id="note" placeholder="例：不要辣、少鹽、對花生過敏…"></textarea>
    </div>
  </div>

  <p class="section-title">付款方式</p>
  <div class="card">
    <div class="field" style="margin-bottom:0">
      <select id="pay">
        <option>現金付款</option>
        <option>Line Pay</option>
        <option>信用卡</option>
        <option>街口支付</option>
      </select>
    </div>
  </div>

  <p class="section-title">訂單摘要</p>
  <div class="card">
    <div id="item-sum-rows"></div>
    <div class="sum-row"><span>小計</span><span id="sum-sub">$0</span></div>
    <div class="sum-row"><span>稅金及其他費用</span><span>$0</span></div>
    <div class="sum-row" id="dlv-row" style="display:none"><span>外送費</span><span>$50</span></div>
    <div class="sum-row bold"><span>總計</span><span id="sum-total">$0</span></div>
  </div>

  <div class="hint-box">
    💡 按下「送出訂單」後，系統會自動開啟您的 Email 程式，訂單內容已自動填入，直接按送出即可。不需要任何帳號或金鑰。
  </div>

  <button class="submit-btn" id="submit-btn" onclick="submitOrder()">📨 送出訂單</button>

  <div class="success-card" id="success-card">
    <i class="ti ti-circle-check success-icon"></i>
    <div class="success-title">Email 已開啟，請確認後送出！</div>
    <div class="success-sub" id="success-sub"></div>
    <button class="copy-btn" onclick="copyOrder()"><i class="ti ti-copy"></i> 複製訂單內容</button>
    <div class="order-box" id="order-box"></div>
  </div>

</div>

<script>
let pickupMode = 'self';
let lastOrderText = '';

function setPickup(mode, btn) {
  pickupMode = mode;
  document.querySelectorAll('.pickup-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('section-self').style.display = mode === 'self' ? 'block' : 'none';
  document.getElementById('section-delivery').style.display = mode === 'delivery' ? 'block' : 'none';
  document.getElementById('section-carry').style.display = mode === 'carry' ? 'block' : 'none';
  document.getElementById('dlv-row').style.display = mode === 'delivery' ? 'flex' : 'none';
  calcTotal();
}

function chg(btn, delta) {
  const row = btn.closest('.menu-item');
  const valEl = row.querySelector('.qty-val');
  const price = parseInt(row.dataset.price);
  let q = Math.max(0, parseInt(valEl.textContent) + delta);
  valEl.textContent = q;
  row.querySelector('.item-total').textContent = q > 0 ? '$' + (price * q) : '—';
  calcTotal();
}

function calcTotal() {
  let sub = 0, rows = '';
  document.querySelectorAll('.menu-item').forEach(row => {
    const q = parseInt(row.querySelector('.qty-val').textContent);
    if (q > 0) {
      const price = parseInt(row.dataset.price);
      const name = row.dataset.name;
      sub += price * q;
      rows += `<div class="sum-row"><span>${name} × ${q}</span><span>$${price * q}</span></div>`;
    }
  });
  document.getElementById('item-sum-rows').innerHTML = rows;
  const dlv = pickupMode === 'delivery' ? 50 : 0;
  document.getElementById('sum-sub').textContent = '$' + sub;
  document.getElementById('sum-total').textContent = '$' + (sub + dlv);
}

function getItems() {
  const items = [];
  document.querySelectorAll('.menu-item').forEach(row => {
    const q = parseInt(row.querySelector('.qty-val').textContent);
    if (q > 0) items.push({ name: row.dataset.name, qty: q, price: parseInt(row.dataset.price) });
  });
  return items;
}

function buildOrderText(name, phone, items, total, modeLabel, pay, note, utensils) {
  const lines = items.map(i => `  ${i.name} × ${i.qty} 份　$${i.price * i.qty}`).join('\n');
  const noteStr = note ? `\n備註：${note}` : '';
  const utensilStr = utensils ? '\n索取餐具：是' : '';
  return `【隆隆排骨便當 線上訂單】\n\n訂購人：${name}\n電話：${phone}\n取餐方式：${modeLabel}\n付款方式：${pay}${utensilStr}\n\n━━ 訂單明細 ━━\n${lines}\n─────────────\n總計金額：$${total}${noteStr}\n\n感謝惠顧！`;
}

function submitOrder() {
  const name = document.getElementById('name').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const storeEmail = document.getElementById('store-email').value.trim();
  const custEmail = document.getElementById('email').value.trim();
  const note = document.getElementById('note').value.trim();
  const utensils = document.getElementById('utensils').checked;
  const pay = document.getElementById('pay').value;

  if (!name || !phone) { alert('請填寫姓名與電話'); return; }
  if (!storeEmail || !storeEmail.includes('@')) { alert('請填寫店家收件信箱'); return; }
  const items = getItems();
  if (items.length === 0) { alert('請至少選擇一項餐點'); return; }

  const dlv = pickupMode === 'delivery' ? 50 : 0;
  const sub = items.reduce((s, i) => s + i.price * i.qty, 0);
  const total = sub + dlv;
  const modeLabel = pickupMode === 'self' ? '門市自取' : pickupMode === 'delivery' ? '外送到府' : '外帶';
  const orderText = buildOrderText(name, phone, items, total, modeLabel, pay, note, utensils);
  lastOrderText = orderText;

  const subject = encodeURIComponent(`【訂單】${name} — 隆隆排骨便當`);
  const body = encodeURIComponent(orderText);
  const cc = custEmail && custEmail.includes('@') ? `&cc=${encodeURIComponent(custEmail)}` : '';
  window.location.href = `mailto:${encodeURIComponent(storeEmail)}?subject=${subject}${cc}&body=${body}`;

  document.getElementById('success-sub').textContent = `Email 程式已開啟，收件人：${storeEmail}${custEmail ? '，已 CC：' + custEmail : ''}。請確認內容後按送出。`;
  document.getElementById('order-box').textContent = orderText;
  document.getElementById('success-card').style.display = 'block';
  document.getElementById('success-card').scrollIntoView({ behavior: 'smooth' });
}

function copyOrder() {
  if (!lastOrderText) return;
  navigator.clipboard.writeText(lastOrderText).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.innerHTML = '<i class="ti ti-check"></i> 已複製！';
    setTimeout(() => { btn.innerHTML = '<i class="ti ti-copy"></i> 複製訂單內容'; }, 2000);
  });
}

const today = new Date().toISOString().split('T')[0];
['pdate','ddate','cdate'].forEach(id => {
  const el = document.getElementById(id);
  if (el) { el.value = today; el.min = today; }
});
</script>
</body>
</html>
